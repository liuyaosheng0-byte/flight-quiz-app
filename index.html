<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飛航管理刷題</title>

<style>
body { font-family: Arial; padding: 20px; }
.question { font-size: 20px; margin-bottom: 10px; white-space: pre-line; }
.option { display: block; margin: 5px 0; padding: 10px; background: #eee; border-radius: 8px; cursor:pointer; }
.correct { background: #a5d6a7; }
.wrong { background: #ef9a9a; }
button { margin-top: 10px; padding: 10px; margin-right: 5px; }
</style>
</head>

<body>

<h2>✈️ 飛航管理程序刷題</h2>

<div id="quiz"></div>
<button onclick="prevQuestion()">上一題</button>
<button onclick="nextQuestion()">下一題</button>

<p id="result"></p>

<script>
let questions = [
{
q: `1.低空滑行准許駕駛員在空中低速滑行或以超過滯空滑行之速度滑行。`,
options: ["A. 50","B. 80","C. 90","D. 100"],
answer: 3
},
{
q:`2. 依國際民航組織詞彙，AFFIRM代表`,
options:["A. 領域","B. 肯定","C. 同意","D. 安檢"],
answer:1
},
{
q:`3. 依國際民航組織詞彙，APPROVED代表`,
options:["A. 領域","B. 肯定","C. 同意","D. 航線設計"],
answer:2
},
{
q:`4. 依國際民航組織詞彙，BREAK BREAK代表`,
options:[
"A. 指部分訊息間之分隔",
"B. 指非常繁忙時刻之訊息分隔"
],
answer:1
},
{
q:`5. 日出至日落之間，當能見度低於多少時應開啟滑行道燈`,
options:["A. 3000公尺","B. 5000公尺","C. 1500公尺","D. 1600公尺"],
answer:2
},
{
q:`6. 選擇使用跑道時應考量`,
options:["A. 機場航線","B. 跑道長度","C. 選項皆是"],
answer:2
},
{
q:`7. 離開航空器滑出前應告知`,
options:["A. 跑道","B. 能見度","C. 煞車狀況","D. 全部"],
answer:3
},
{
q:`8. 塔台雷達顯示器看到航空器代表`,
options:["A. 不符合","B. 符合","C. 僅供參考"],
answer:1
},
{
q:`9. 模擬熄火進場前應`,
options:["A. 戰管同意","B. 高勤官同意","C. 工作協議書"],
answer:1
},
{
q:`10. 模擬熄火航線在何處需頒發低空通過許可`,
options:["A. 低鍵點","B. 四邊","C. 五邊"],
answer:0
},
{
q:`11. 直接進場通常在幾浬外頒發許可`,
options:["A. 5邊5浬","B. 5邊4浬","C. 5邊3浬"],
answer:2
},
{
q:`12. 儀器轉目視飛航視為`,
options:["A. 儀器離場","B. 目視離場","C. 皆非"],
answer:0
},
{
q:`13. 目視轉儀器飛航視為`,
options:["A. 目視離場","B. 儀器離場","C. 皆可"],
answer:0
},
{
q:`14. 儀器離場許可包括`,
options:["A. 航線","B. 失效時間","C. 操作","D. 以上皆是"],
answer:3
},
{
q:`15. 特許航線飛航需先獲得`,
options:["A. 戰管","B. 管制單位","C. 航管"],
answer:1
},
{
q:`16. 誤失進場時尚未達`,
options:["A. 空層","B. 最低高度","C. 雷達高度","D. 皆是"],
answer:3
},
{
q:`17. 目視地面後應`,
options:["A. 繼續程序","B. 改目視","C. 取消儀器"],
answer:0
},
{
q:`18. 繞場進場需有`,
options:["A. 近場","B. 塔台","C. 皆是"],
answer:1
},
{
q:`19. 儀器進場練習需採標準隔離直到`,
options:["A. 落地","B. 管制決定","C. 天氣不佳"],
answer:0
},
{
q:`20. 連續起降在何時視為到場`,
options:["A. 最後進場點","B. 交接點","C. 通過跑道頭"],
answer:2
}
];

let current = 0;
let userAnswers = new Array(questions.length).fill(null);

function loadQuestion() {
    let q = questions[current];
    let html = `<div class="question">${q.q}</div>`;

    q.options.forEach((opt, index) => {
        html += `<div class="option" onclick="selectOption(${index})">${opt}</div>`;
    });

    document.getElementById("quiz").innerHTML = html;

    if (userAnswers[current] !== null) {
        showAnswer(userAnswers[current]);
    }
}

function selectOption(index) {
    if (userAnswers[current] !== null) return;
    userAnswers[current] = index;
    showAnswer(index);
}

function showAnswer(index) {
    let q = questions[current];
    let options = document.getElementsByClassName("option");

    for (let i = 0; i < options.length; i++) {
        options[i].classList.remove("correct", "wrong");

        if (i === q.answer) options[i].classList.add("correct");
        if (i === index && i !== q.answer) options[i].classList.add("wrong");
    }
}

function nextQuestion() {
    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        showResult();
    }
}

function prevQuestion() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}

function showResult() {
    let score = 0;
    questions.forEach((q, i) => {
        if (userAnswers[i] === q.answer) score++;
    });

    document.getElementById("quiz").innerHTML = "";
    document.getElementById("result").innerText = `完成！分數：${score}/${questions.length}`;
}

loadQuestion();
</script>

</body>
</html>
