<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飛航管理刷題</title>

<style>
body { font-family: Arial; padding: 20px; }
.question { font-size: 20px; margin-bottom: 10px; white-space: pre-line; }
.option { display: block; margin: 5px 0; padding: 10px; background: #eee; border-radius: 8px; cursor:pointer; }
.correct { background: #a5d6a7; }
.wrong { background: #ef9a9a; }
button { margin-top: 10px; padding: 10px; margin-right: 5px; }
</style>
</head>

<body>

<h2>✈️ 飛航管理程序刷題</h2>

<div id="quiz"></div>
<button onclick="prevQuestion()">上一題</button>
<button onclick="nextQuestion()">下一題</button>

<p id="result"></p>

<script>
let questions = [
{
q: `1.低空滑行准許駕駛員在空中低速滑行或以超過滯空滑行之速度滑行。除非駕駛員要去或管制員另有指示，駕駛員必須維持高於地面。`,
options: ["A. 50","B. 80","C. 90","D. 100"],
answer: 3
},
{
q:`2. 依國際民航組織詞彙，AFFIRM代表`,
options:["A. 領域","B. 肯定","C. 同意","D. 安檢"],
answer:1
},
{
q:`3. 依國際民航組織詞彙，APPROVED代表`,
options:["A. 領域","B. 肯定","C. 同意","D. 航線設計"],
answer:2
},
{
q:`4.依國際民航組織詞彙，BREAK BREAK代表`,
options:[
"A. 指部分訊息間之分隔（使用於訊息前後部分分隔不明確時。）",
"B. 指非常繁忙時刻，傳遞訊息時又將對不同航空器傳遞訊息之分隔"
],
answer:1
},
{
q:`5.日出至日落之間，當能見度低於(A)3000公尺(B)5000公尺(C)1500公尺(D)1600公尺時，應開啟滑行道燈。`,
options:["A. 3000公尺","B. 5000公尺","C. 1500公尺","D. 1600公尺"],
answer:2
},
{
q:`6.選擇使用跑道時，機場管制單位除地面風之風速及風場外，尚應考量其他相關因素`,
options:["A. 機場航線","B. 跑道長度","C. 選項皆是"],
answer:2
},
{
q:`7.於離開航空器滑出前應告知何種資料`,
options:["A. 跑道","B. 能見度","C. 煞車狀況","D. 全部"],
answer:3
},
{
q:`8.在塔台搜索雷達顯示器上看到航空器`,
options:["A. 不符合","B. 符合","C. 僅供參考"],
answer:1
},
{
q:`9.准許軍用航空器實施模擬熄火進場/戒備航線進場練習前，應`,
options:["A基地作指中心同意","B基地高勤官同意","C訂定有效之工作協議書。"],
answer:2
},
{
q:`10.模擬熄火航線在     需頒發低空通過許可或備份指示。`,
options:["A. 低鍵點","B. 四邊","C. 五邊"],
answer:0
},
{
q:`11.模擬熄火航線直接進場通常在    外頒發低空通過許可或備份指示。`,
options:["A. 5邊5浬","B. 5邊4浬","C. 5邊3浬"],
answer:2
},
{
q:`12.對申請先作儀器飛航，再作目視飛航之航空器，許可至`,
options:["A儀器飛航離場","B目視飛航離場","C以上皆非"],
answer:0
},
{
q:`13.對申請先作目視飛航，再作儀器飛航之航空器，視為`,
options:["A目視飛航離場","B儀器飛航離場","C以上皆可"],
answer:0
},
{
q:`14.儀器飛航離場許可包括哪些項目`,
options:["A飛航航線","B許可失效時間","C離場或到場操作","D以上皆是"],
answer:3
},
{
q:`15.軍用航空器於特許航線飛航，事先獲得   同意`,
options:["A戰管單位","B相關管制單位","C航管單位"],
answer:1
},
{
q:`16.誤失進場時，航空器尚未到達`,
options:["A誤失進場空層","B最低儀航高度","C最低雷達引導高度前","D以上皆是，不要要求其更換頻率/雷達電碼。"],
answer:3
},
{
q:`17.許可儀器進場後，如駕駛員目視地面時，`,
options:["A遵照程序完成進場","B立即改為目視","C取消儀器飛航計畫。"],
answer:0
},
{
q:`18.在有   的機場才給予繞場進場的指示。`,
options:["A近場管制服務","B管制塔台服務","C以上皆是"],
answer:1
},
{
q:`19.儀器飛航之航空器練習儀器進場應採用標準隔離直到`,
options:["A航空器落地且飛行終止","B管制員視情況","C機場天氣情況不允許"],
answer:0
},
{
q:`20.將許可作連續起降、低空通過之航空器在   之前視為到場航空器。 `,
options:["A最後進場點","B管制交接點","C通過跑到頭"],
answer:2
}
];

let current = 0;
let userAnswers = new Array(questions.length).fill(null);

function loadQuestion() {
    let q = questions[current];
    let html = `<div class="question">${q.q}</div>`;

    q.options.forEach((opt, index) => {之前視為到場航空器。
        html += `<div class="option" onclick="selectOption(${index})">${opt}</div>`;
    });

    document.getElementById("quiz").innerHTML = html;

    if (userAnswers[current] !== null) {
        showAnswer(userAnswers[current]);
    }
}

function selectOption(index) {
    if (userAnswers[current] !== null) return;
    userAnswers[current] = index;
    showAnswer(index);
}

function showAnswer(index) {
    let q = questions[current];
    let options = document.getElementsByClassName("option");

    for (let i = 0; i < options.length; i++) {
        if (i === q.answer) options[i].classList.add("correct");
        if (i === index && i !== q.answer) options[i].classList.add("wrong");
    }
}

function nextQuestion() {
    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        showResult();
    }
}

function prevQuestion() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}

function showResult() {
    let score = 0;
    questions.forEach((q, i) => {
        if (userAnswers[i] === q.answer) score++;
    });

    document.getElementById("quiz").innerHTML = "";
    document.getElementById("result").innerText = `完成！分數：${score}/${questions.length}`;
}

loadQuestion();
</script>

</body>
</html>
