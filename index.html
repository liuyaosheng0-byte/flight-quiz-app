<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飛航刷題App</title>
<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:20px; border-radius:12px; }
.option { margin:8px 0; padding:12px; background:#eee; border-radius:8px; cursor:pointer; }
.correct { background:#a5d6a7; }
.wrong { background:#ef9a9a; }
button { margin:5px; padding:10px; border:none; border-radius:8px; background:#1976d2; color:white;}
</style>
</head>

<body>

<h2>✈️ 飛航刷題App</h2>

<div class="card">
<div id="mode"></div>
<div id="progress"></div>
<div id="quiz"></div>
<div id="explain"></div>

<button onclick="prev()">上一題</button>
<button onclick="next()">下一題</button>
<button onclick="restart()">重新開始</button>
<button onclick="shuffleQuestions()">隨機出題</button>
<button onclick="examMode()">考試模式</button>
</div>

<p id="result"></p>

<script>
let originalQuestions = [
{q:"AFFIRM代表",options:["領域","肯定","同意"],answer:1,explain:"AFFIRM=肯定"},
{q:"APPROVED代表",options:["領域","肯定","同意"],answer:2,explain:"APPROVED=同意"},
{q:"BREAK BREAK代表",options:["訊息分隔","忙碌分隔"],answer:1,explain:"用於不同航空器訊息分隔"},
{q:"能見度低於多少開燈",options:["3000","5000","1500","1600"],answer:2,explain:"1500公尺"},
{q:"跑道選擇考量",options:["航線","長度","全部"],answer:2,explain:"全部"},
{q:"滑出前應告知",options:["跑道","能見度","煞車","全部"],answer:3,explain:"全部"},
{q:"雷達顯示器看到航空器",options:["不符合","符合","參考"],answer:1,explain:"符合"},
{q:"模擬熄火需",options:["作指同意","高勤官","協議書"],answer:2,explain:"需協議書"},
{q:"低空通過點",options:["低鍵點","四邊","五邊"],answer:0,explain:"低鍵點"},
{q:"直接進場距離",options:["5浬","4浬","3浬"],answer:2,explain:"3浬"},
{q:"IFR再VFR",options:["IFR離場","VFR","無"],answer:0,explain:"算IFR"},
{q:"VFR再IFR",options:["VFR","IFR","皆可"],answer:0,explain:"算VFR"},
{q:"離場許可包含",options:["航線","時間","操作","全部"],answer:3,explain:"全部"},
{q:"軍機特許航線",options:["戰管","相關單位","航管"],answer:1,explain:"相關單位"},
{q:"低空滑行高度",options:["50","80","90","100"],answer:3,explain:"100呎"}
];

let questions = [...originalQuestions];
let current=0;
let userAnswers=[];
let wrong=[];
let isExam=false;

function load(){
 let q=questions[current];
 document.getElementById("progress").innerText=`第 ${current+1}/${questions.length} 題`;
 document.getElementById("mode").innerText = isExam ? "📘 考試模式" : "📗 練習模式";

 let html=`<h3>${q.q}</h3>`;
 q.options.forEach((opt,i)=>{
  html+=`<div class="option" onclick="select(${i})" id="o${i}">${opt}</div>`;
 });
 document.getElementById("quiz").innerHTML=html;
 document.getElementById("explain").innerHTML="";

 if(userAnswers[current]!=null && !isExam){
   show(userAnswers[current]);
 }
}

function select(i){
 userAnswers[current]=i;
 let q=questions[current];

 if(!isExam){
   if(i!==q.answer){
     if(!wrong.includes(current)) wrong.push(current);
   }else{
     wrong = wrong.filter(x=>x!==current);
   }
   show(i);
 }

 setTimeout(()=>{
   if(current < questions.length-1){
     current++;
     load();
   }else{
     result();
   }
 },500);
}

function show(i){
 let q=questions[current];
 for(let j=0;j<q.options.length;j++){
  let el=document.getElementById("o"+j);
  if(j===q.answer) el.classList.add("correct");
  if(j===i && j!==q.answer) el.classList.add("wrong");
 }
 document.getElementById("explain").innerHTML=
 `答案：${q.options[q.answer]}<br>解析：${q.explain}`;
}

function next(){ if(current<questions.length-1){current++;load();} else result();}
function prev(){ if(current>0){current--;load();}}

function result(){
 let s=0;
 questions.forEach((q,i)=>{if(userAnswers[i]===q.answer)s++;});
 document.getElementById("result").innerText=`分數：${s}/${questions.length}`;
}

function restart(){
 current=0;
 userAnswers=[];
 wrong=[];
 isExam=false;
 questions=[...originalQuestions];
 load();
 document.getElementById("result").innerText="";
}

function shuffleQuestions(){
 questions = [...questions].sort(()=>Math.random()-0.5);
 current=0;
 load();
}

function examMode(){
 restart();
 isExam=true;
 load();
}

load();
</script>

</body>
</html>
