let current = 0;
let userAnswers = new Array(questions.length).fill(null);

function loadQuestion() {
    let q = questions[current];
    let html = `<div class="question">${q.q}</div>`;

    q.options.forEach((opt, index) => {
        html += `<div class="option" onclick="selectOption(${index})">${opt}</div>`;
    });

    document.getElementById("quiz").innerHTML = html;

    if (userAnswers[current] !== null) {
        showAnswer(userAnswers[current]);
    }
}

function selectOption(index) {
    if (userAnswers[current] !== null) return;
    userAnswers[current] = index;
    showAnswer(index);
}

function showAnswer(index) {
    let q = questions[current];
    let options = document.getElementsByClassName("option");

    for (let i = 0; i < options.length; i++) {
        if (i === q.answer) options[i].classList.add("correct");
        if (i === index && i !== q.answer) options[i].classList.add("wrong");
    }
}

function nextQuestion() {
    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        showResult();
    }
}

function prevQuestion() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}

function showResult() {
    let score = 0;
    questions.forEach((q, i) => {
        if (userAnswers[i] === q.answer) score++;
    });

    document.getElementById("quiz").innerHTML = "";
    document.getElementById("result").innerText = `完成！分數：${score}/${questions.length}`;
}

loadQuestion();
</script>
